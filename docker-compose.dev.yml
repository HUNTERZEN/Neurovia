version: '3.8'

services:
  web:
    build: 
      context: .
      target: builder
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development
    networks:
      - neurovia-network

networks:
  neurovia-network:
    driver: bridge 